name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build bundle
        run: bun run bundle

      - name: Run tests
        run: bun test

      - name: Type check
        run: tsc --noEmit

  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build bundle
        run: bun run bundle

      - name: Verify bundle is non-empty
        run: |
          if [ ! -s dist/opencopilot.ts ]; then
            echo "Error: dist/opencopilot.ts is empty or missing"
            exit 1
          fi
          echo "Bundle size: $(wc -c < dist/opencopilot.ts) bytes"

      - name: Verify package.json version matches git tag
        id: verify
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Git tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Git tag '$TAG_VERSION' does not match package.json version '$PKG_VERSION'"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: dist/opencopilot.ts
          retention-days: 1

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: bundle
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/opencopilot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: npm Publish
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build bundle
        run: bun run bundle

      - name: Show npm version (verify >= 11.5.1)
        run: npm --version

      - name: Publish to npm
        run: npm publish --access public
